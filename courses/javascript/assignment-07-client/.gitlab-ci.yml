stages:
  - test
  - package
  - deploy

.javascript_assignment07_changes: &javascript_assignment07_changes
  - courses/javascript/assignment-07-client/**/*
  - .gitlab-ci.yml

.javascript_assignment07_job: &javascript_assignment07_job
  rules:
    - changes: *javascript_assignment07_changes
    - when: never

.javascript_assignment07_deploy_job: &javascript_assignment07_deploy_job
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'
      changes: *javascript_assignment07_changes
    - when: never

javascript_assignment07_lint_and_build:
  stage: test
  tags:
    - shared
  <<: *javascript_assignment07_job
  script:
    - >-
      docker run --rm
      --user "$(id -u):$(id -g)"
      -v "$CI_PROJECT_DIR/courses/javascript/assignment-07-client:/workspace:ro"
      -w /tmp
      -e npm_config_cache=/tmp/npm-cache
      node:20-alpine sh -lc "mkdir -p /tmp/app /tmp/npm-cache && cp -R /workspace/. /tmp/app && cd /tmp/app && npm ci --no-audit --no-fund && npm run lint && npm run build"

javascript_assignment07_docker_build:
  stage: package
  tags:
    - shared
  needs:
    - javascript_assignment07_lint_and_build
  <<: *javascript_assignment07_job
  before_script:
    - cd courses/javascript/assignment-07-client
  script:
    - docker compose -f docker-compose.yml build --pull

javascript_assignment07_deploy:
  stage: deploy
  tags:
    - shared
  needs:
    - javascript_assignment07_docker_build
  environment:
    name: javascript-assignment-07-production
    url: https://mtiker-js-a07.proxy.itcollege.ee
  <<: *javascript_assignment07_deploy_job
  before_script:
    - cd courses/javascript/assignment-07-client
  script:
    # Pin the backend URL here so the deploy-stage rebuild does not inherit a
    # stale VITE_API_BASE_URL from the runner env file. Compose substitution
    # prefers this shell variable over the copied .env, so the bundle always
    # bakes in the live cweb-a4 host.
    - export VITE_API_BASE_URL="https://mtiker-cweb-a4.proxy.itcollege.ee"
    - chmod +x scripts/deploy.sh
    - ./scripts/deploy.sh
