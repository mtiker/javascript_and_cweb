stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE/a05-react-todo:$CI_COMMIT_SHORT_SHA

build:image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  tags:
    - shared
  only:
    - main
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build
        --build-arg NEXT_PUBLIC_API_BASE_URL=https://taltech.akaver.com
        -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"

deploy:vps:
  stage: deploy
  tags:
    - shared
  only:
    - main
  needs: ["build:image"]
  script:
    - cp /home/gitlab-runner/mtiker-js-react.env .env
    - docker compose -p mtiker-js-react -f docker-compose.prod.yml pull || true
    - docker compose -p mtiker-js-react -f docker-compose.prod.yml down --remove-orphans
    - docker compose -p mtiker-js-react -f docker-compose.prod.yml up --build --remove-orphans --detach
    - |
      for i in $(seq 1 30); do
        if curl --fail --silent http://127.0.0.1:88/api/health >/dev/null; then
          echo "Health check passed on attempt $i"
          exit 0
        fi
        sleep 2
      done
      echo "Health check failed after 30 attempts" >&2
      docker compose -p mtiker-js-react -f docker-compose.prod.yml logs --tail=50 react-app >&2 || true
      exit 1
