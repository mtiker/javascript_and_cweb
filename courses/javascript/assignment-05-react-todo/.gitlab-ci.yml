stages:
  - build
  - deploy

build:image:
  stage: build
  tags:
    - shared
  only:
    - main
  before_script:
    - cd courses/javascript/assignment-05-react-todo
  script:
    - docker compose -f docker-compose.prod.yml build --pull

deploy:vps:
  stage: deploy
  tags:
    - shared
  only:
    - main
  needs: ["build:image"]
  before_script:
    - cd courses/javascript/assignment-05-react-todo
  script:
    - cp /home/gitlab-runner/mtiker-js-react.env .env
    - docker compose -p mtiker-js-react -f docker-compose.prod.yml down --remove-orphans
    - docker compose -p mtiker-js-react -f docker-compose.prod.yml up --build --remove-orphans --detach
    - |
      for i in $(seq 1 30); do
        if curl --fail --silent http://127.0.0.1:88/api/health >/dev/null; then
          echo "Health check passed on attempt $i"
          exit 0
        fi
        sleep 2
      done
      echo "Health check failed after 30 attempts" >&2
      docker compose -p mtiker-js-react -f docker-compose.prod.yml logs --tail=50 react-app >&2 || true
      exit 1
