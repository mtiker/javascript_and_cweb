.javascript_assignment03_changes: &javascript_assignment03_changes
  - courses/javascript/assignment-01-task-manager/**/*
  - courses/javascript/assignment-02-ts-task-manager/**/*
  - courses/javascript/assignment-03-ci-cd-1/**/*
  - .gitlab-ci.yml

.javascript_assignment03_job: &javascript_assignment03_job
  rules:
    - changes: *javascript_assignment03_changes
    - when: never

.javascript_assignment03_deploy_job: &javascript_assignment03_deploy_job
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'
      changes: *javascript_assignment03_changes
    - when: never

javascript_assignment03_a01_test:
  stage: test
  tags:
    - shared
  <<: *javascript_assignment03_job
  script:
    - docker run --rm -v "$CI_PROJECT_DIR/courses/javascript/assignment-01-task-manager:/app" -w /app node:20-alpine npm test

javascript_assignment03_a02_test:
  stage: test
  tags:
    - shared
  <<: *javascript_assignment03_job
  script:
    - docker run --rm -v "$CI_PROJECT_DIR/courses/javascript/assignment-02-ts-task-manager:/app" -w /app node:20-alpine sh -lc "npm ci && npm run check && npm test"

javascript_assignment03_docker_build:
  stage: package
  tags:
    - shared
  needs:
    - javascript_assignment03_a01_test
    - javascript_assignment03_a02_test
  <<: *javascript_assignment03_job
  before_script:
    - cd courses/javascript/assignment-03-ci-cd-1
  script:
    - docker compose -f docker-compose.prod.yml build --pull

javascript_assignment03_deploy:
  stage: deploy
  tags:
    - shared
  needs:
    - javascript_assignment03_docker_build
  environment:
    name: javascript-assignment-03-production
  <<: *javascript_assignment03_deploy_job
  before_script:
    - cd courses/javascript/assignment-03-ci-cd-1
  script:
    - chmod +x scripts/deploy.sh
    - ./scripts/deploy.sh
