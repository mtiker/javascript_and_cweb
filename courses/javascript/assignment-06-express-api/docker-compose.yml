services:
  postgres:
    image: postgres:16-alpine
    container_name: mtiker-js-a06-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-a06_todo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-a06_todo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  express-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mtiker-js-a06-express
    restart: unless-stopped
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-a06_todo}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:87,http://localhost:89,https://mtiker-js-vue-a6.proxy.itcollege.ee,https://mtiker-js-react-a6.proxy.itcollege.ee}
    ports:
      - "86:3001"
    depends_on:
      postgres:
        condition: service_healthy

  vue-client:
    build:
      context: ./vue-client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://mtiker-js-express.proxy.itcollege.ee/api/v1}
    container_name: mtiker-js-a06-vue
    restart: unless-stopped
    ports:
      - "87:80"
    depends_on:
      - express-api

  react-client:
    build:
      context: ./react-client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://mtiker-js-express.proxy.itcollege.ee}
    container_name: mtiker-js-a06-react
    restart: unless-stopped
    ports:
      - "89:3000"
    depends_on:
      - express-api

volumes:
  pgdata:
