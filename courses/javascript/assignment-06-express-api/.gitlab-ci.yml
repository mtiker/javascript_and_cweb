stages:
  - test
  - package
  - deploy

.javascript_assignment06_changes: &javascript_assignment06_changes
  - courses/javascript/assignment-06-express-api/**/*
  - .gitlab-ci.yml

.javascript_assignment06_job: &javascript_assignment06_job
  rules:
    - changes: *javascript_assignment06_changes
    - when: never

.javascript_assignment06_deploy_job: &javascript_assignment06_deploy_job
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'
      changes: *javascript_assignment06_changes
    - when: never

javascript_assignment06_api_test:
  stage: test
  tags:
    - shared
  <<: *javascript_assignment06_job
  script:
    - >-
      docker run --rm
      --user "$(id -u):$(id -g)"
      -v "$CI_PROJECT_DIR/courses/javascript/assignment-06-express-api/api:/workspace:ro"
      -w /tmp
      -e npm_config_cache=/tmp/npm-cache
      node:22-alpine sh -lc "mkdir -p /tmp/app /tmp/npm-cache && cp -R /workspace/. /tmp/app && cd /tmp/app && npm ci && npm run build && npm test"

javascript_assignment06_vue_test:
  stage: test
  tags:
    - shared
  <<: *javascript_assignment06_job
  script:
    - >-
      docker run --rm
      --user "$(id -u):$(id -g)"
      -v "$CI_PROJECT_DIR/courses/javascript/assignment-06-express-api/vue-client:/workspace:ro"
      -w /tmp
      -e npm_config_cache=/tmp/npm-cache
      node:20-alpine sh -lc "mkdir -p /tmp/app /tmp/npm-cache && cp -R /workspace/. /tmp/app && cd /tmp/app && npm ci && npm run check && npm test"

javascript_assignment06_react_test:
  stage: test
  tags:
    - shared
  <<: *javascript_assignment06_job
  script:
    - >-
      docker run --rm
      --user "$(id -u):$(id -g)"
      -v "$CI_PROJECT_DIR/courses/javascript/assignment-06-express-api/react-client:/workspace:ro"
      -w /tmp
      -e npm_config_cache=/tmp/npm-cache
      -e NEXT_TELEMETRY_DISABLED=1
      node:20-alpine sh -lc "mkdir -p /tmp/app /tmp/npm-cache && cp -R /workspace/. /tmp/app && cd /tmp/app && npm ci && npm test"

javascript_assignment06_docker_build:
  stage: package
  tags:
    - shared
  needs:
    - javascript_assignment06_api_test
    - javascript_assignment06_vue_test
    - javascript_assignment06_react_test
  <<: *javascript_assignment06_job
  before_script:
    - cd courses/javascript/assignment-06-express-api
  script:
    # Provide minimal env values so `docker compose build` can interpolate
    # the build args without failing — the values themselves never reach
    # the running containers from this stage.
    - export JWT_SECRET="ci-build-placeholder"
    - docker compose -f docker-compose.yml build --pull

javascript_assignment06_deploy:
  stage: deploy
  tags:
    - shared
  needs:
    - javascript_assignment06_docker_build
  environment:
    name: javascript-assignment-06-production
  <<: *javascript_assignment06_deploy_job
  before_script:
    - cd courses/javascript/assignment-06-express-api
  script:
    - chmod +x scripts/deploy.sh
    - ./scripts/deploy.sh
