services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multi_gym_management_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - multi-gym-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-multi_gym_management_system}"]
      interval: 5s
      timeout: 3s
      retries: 15

  web:
    image: ${MULTI_GYM_IMAGE:-multi-gym-management-system:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN:-https://mtiker-cweb-a4.proxy.itcollege.ee}
      Cors__AllowedOrigins__1: ${CORS_ALLOWED_ORIGIN_CLIENT:-}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-multi_gym_management_system};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      JWT__Key: ${JWT__Key:?JWT__Key must be set}
      JWT__Issuer: ${JWT__Issuer:-MultiGymManagementSystem}
      JWT__Audience: ${JWT__Audience:-MultiGymManagementSystem}
      Jwt__AccessTokenMinutes: ${JWT__AccessTokenMinutes:-60}
      DataInitialization__MigrateDatabase: ${DATA_INIT_MIGRATE_DATABASE:-true}
      DataInitialization__SeedData: ${DATA_INIT_SEED_DATA:-true}
    ports:
      - "${WEBAPP_PORT:-83}:8080"

  client:
    profiles: ["client"]
    image: ${MULTI_GYM_CLIENT_IMAGE:-multi-gym-management-system-client:local}
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8081}:8080"

volumes:
  multi-gym-postgres-data:
