# Static-host config for the React client.
# - Listens on :8080 to match the backend container's plain-HTTP layout.
# - Serves the SPA under /client/ so the bundled asset URLs (Vite base "/client/")
#   resolve without rewriting.
# - SPA fallback to /client/index.html for any unknown sub-route.
# - Long-lived caching on hashed asset files; no-cache on index.html.
# - Security headers suitable for an SPA proxied by an upstream TLS terminator.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text payloads (TLS termination is upstream, so no brotli here).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    # Hide nginx version from response headers.
    server_tokens off;

    # Liveness probe used by Docker HEALTHCHECK and reverse proxies.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Top-level redirect so visiting the bare client host lands on the SPA.
    location = / {
        return 302 /client/;
    }

    # Hashed asset files — cache hard.
    location ~* ^/client/assets/.+\.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The SPA itself: serve the file if present, otherwise fall back to index.html.
    location /client/ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /client/index.html;
    }

    # Anything else (legacy paths, accidental hits) → SPA root.
    location / {
        return 302 /client/;
    }
}
