stages:
  - build
  - test
  - package
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

default:
  interruptible: true

variables:
  GIT_STRATEGY: fetch
  GIT_CLONE_PATH: $CI_BUILDS_DIR/$CI_PIPELINE_ID/$CI_JOB_NAME_SLUG
  ASSIGNMENT_18_PATH: courses/webapp-csharp/assignment-18-dental-clinic-platform

include:
  - local: "courses/javascript/assignment-03-ci-cd-1/.gitlab-ci.yml"
  - local: "courses/webapp-csharp/assignment-18-dental-clinic-platform/.gitlab-ci.yml"
